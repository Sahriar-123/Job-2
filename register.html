<!DOCTYPE html>
<html>
<head>
<title>User Access</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="./css/index.css">
</head>

<body class="bg-dark text-light">



    <nav aria-label="breadcrumb">
<ol class="breadcrumb bg-secondary p-3 rounded">
<li class="breadcrumb-item"><a class="text-warning fw-bold" href="./index.html">Home</a></li>
<li class="breadcrumb-item"><a class="text-warning fw-bold" href="./login.html">Login</a></li>
<li class="breadcrumb-item active text-white fw-bold">Register</li>
</ol>
</nav>

<div class="container">
<div class="row justify-content-center mt-5">
<div class="col-md-6">

<div class="card bg-black text-light border-warning shadow-lg">

<div class="card-header text-center bg-secondary">
<h3 class="text-warning fw-bold">Member Login</h3>
</div>

<div class="card-body">

<form onsubmit="event.preventDefault(); alert('Welcome! Login completed successfully.');">

<div class="mb-3">
<label class="text-info fw-semibold">Given Name</label>
<input required type="text" class="form-control bg-dark text-light border-info" placeholder="Enter first name">
</div>

<div class="mb-3">
<label class="text-info fw-semibold">Family Name</label>
<input required type="text" class="form-control bg-dark text-light border-info" placeholder="Enter last name">
</div>

<div class="mb-3">
<label class="text-info fw-semibold">Email Address</label>
<input required type="email" class="form-control bg-dark text-light border-info" placeholder="Enter your email">
</div>

<div class="mb-3">
<label class="text-info fw-semibold">Account Password</label>
<input required type="password" class="form-control bg-dark text-light border-info" placeholder="Type password">
</div>

<button type="submit" class="btn btn-warning w-100 btn-lg fw-bold">Sign In</button>

</form>

<hr class="border-secondary">

</div>

</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/index.js"></script>
</body>
</html>
